<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1222"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6b7280"/>
      <stop offset="25%" style="stop-color:#d1d5db"/>
      <stop offset="50%" style="stop-color:#9ca3af"/>
      <stop offset="75%" style="stop-color:#d1d5db"/>
      <stop offset="100%" style="stop-color:#6b7280"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Stacked plates -->
  <rect x="60" y="100" width="280" height="30" rx="3" fill="#9ca3af" stroke="#6b7280" stroke-width="1.5"/>
  <rect x="60" y="140" width="280" height="35" rx="3" fill="url(#metal)" stroke="#6b7280" stroke-width="1.5"/>
  <rect x="60" y="185" width="280" height="40" rx="3" fill="#b4bcc8" stroke="#6b7280" stroke-width="1.5"/>
  <rect x="60" y="235" width="280" height="30" rx="3" fill="#9ca3af" stroke="#6b7280" stroke-width="1.5"/>
  <!-- Label -->
  <text x="200" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#f8fafc">EN21</text>
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">Ni-Cr-Mo Steel</text>
  <!-- Badge -->
  <rect x="10" y="10" width="140" height="30" rx="6" fill="#059669"/>
  <text x="80" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">HIGH STRENGTH</text>
</svg>