<!-- Static form skeleton for Netlify build-time form detection -->
<html>
  <body>
    <form name="order-notification" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="order-notification" />
      <input name="order-date" />
      <input name="order-items" />
      <input name="order-total" />
      <input name="item-count" />
      <input name="bot-field" />
    </form>
  </body>
</html>
