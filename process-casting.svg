<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="csbg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a00"/>
      <stop offset="100%" stop-color="#1c1106"/>
    </linearGradient>
    <linearGradient id="moltenmetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="30%" stop-color="#fbbf24"/>
      <stop offset="60%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="ladle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#57534e"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
    <linearGradient id="mold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#78716c"/>
      <stop offset="50%" stop-color="#a8a29e"/>
      <stop offset="100%" stop-color="#78716c"/>
    </linearGradient>
    <filter id="csglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="csglow2">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="pourglow" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#csbg)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#fde68a" font-size="18" font-family="sans-serif" font-weight="700" letter-spacing="2">METAL CASTING PROCESS</text>
  <text x="400" y="55" text-anchor="middle" fill="#a16207" font-size="11" font-family="sans-serif">Melting → Pouring → Solidification → Knockout</text>

  <!-- STEP 1: Melting Furnace -->
  <g transform="translate(30, 70)">
    <!-- Furnace body -->
    <path d="M 30 30 L 30 180 Q 30 210 60 210 L 120 210 Q 150 210 150 180 L 150 30 Z" fill="url(#ladle)" stroke="#78716c" stroke-width="1.5"/>
    <!-- Inner glow -->
    <rect x="45" y="50" width="90" height="140" rx="4" fill="#451a03"/>
    <rect x="45" y="50" width="90" height="140" rx="4" fill="url(#pourglow)"/>
    <!-- Molten metal surface -->
    <rect x="50" y="100" width="80" height="80" rx="2" fill="url(#moltenmetal)" filter="url(#csglow)"/>
    <path d="M 50 100 Q 70 94 90 100 Q 110 106 130 100" stroke="#fde68a" stroke-width="1" fill="none" opacity="0.8"/>

    <!-- Burner flames -->
    <path d="M 55 190 Q 60 170 65 190" fill="#ef4444" opacity="0.6"/>
    <path d="M 70 190 Q 77 165 84 190" fill="#f97316" opacity="0.7"/>
    <path d="M 90 190 Q 95 172 100 190" fill="#ef4444" opacity="0.5"/>
    <path d="M 110 190 Q 115 175 120 190" fill="#f97316" opacity="0.6"/>

    <!-- Temperature -->
    <rect x="45" y="222" width="90" height="18" rx="3" fill="#451a03" stroke="#a16207" stroke-width="0.5"/>
    <text x="90" y="235" text-anchor="middle" fill="#fbbf24" font-size="11" font-family="monospace" font-weight="700">1650°C</text>

    <text x="90" y="260" text-anchor="middle" fill="#fca5a5" font-size="11" font-family="sans-serif" font-weight="600">① MELTING</text>
  </g>

  <!-- Arrow -->
  <path d="M 195 200 L 225 200" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
  <polygon points="225,196 233,200 225,204" fill="#f97316"/>

  <!-- STEP 2: Pouring into Mold -->
  <g transform="translate(240, 65)">
    <!-- Ladle (tilted) -->
    <g transform="rotate(-35 80 80)">
      <path d="M 40 50 L 40 120 Q 40 140 60 140 L 100 140 Q 120 140 120 120 L 120 50 Z" fill="url(#ladle)" stroke="#78716c" stroke-width="1.5"/>
      <!-- Molten metal in ladle -->
      <rect x="48" y="80" width="64" height="50" rx="2" fill="url(#moltenmetal)" filter="url(#csglow)" opacity="0.9"/>
    </g>

    <!-- Pour stream -->
    <path d="M 115 85 Q 120 120 125 160 Q 128 190 130 210" stroke="#fbbf24" stroke-width="8" stroke-linecap="round" filter="url(#csglow2)" opacity="0.9"/>
    <path d="M 115 85 Q 120 120 125 160 Q 128 190 130 210" stroke="#fde68a" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

    <!-- Mold (sand mold, two halves) -->
    <!-- Cope (top half) -->
    <rect x="80" y="175" width="120" height="35" rx="3" fill="url(#mold)" stroke="#a8a29e" stroke-width="1"/>
    <!-- Sprue opening -->
    <rect x="125" y="170" width="14" height="10" rx="1" fill="#451a03"/>
    <!-- Drag (bottom half) -->
    <rect x="80" y="212" width="120" height="35" rx="3" fill="#78716c" stroke="#a8a29e" stroke-width="1"/>
    <!-- Parting line -->
    <line x1="80" y1="210" x2="200" y2="210" stroke="#a8a29e" stroke-width="1" stroke-dasharray="4,3"/>
    <!-- Mold cavity (visible glow) -->
    <rect x="100" y="195" width="80" height="25" rx="8" fill="#f97316" opacity="0.3" filter="url(#csglow)"/>

    <!-- Splash/sparks at pour point -->
    <g filter="url(#csglow)">
      <circle cx="128" cy="178" r="2" fill="#fbbf24" opacity="0.8"/>
      <line x1="130" y1="178" x2="140" y2="170" stroke="#fbbf24" stroke-width="0.8" opacity="0.6"/>
      <line x1="130" y1="178" x2="120" y2="168" stroke="#f97316" stroke-width="0.8" opacity="0.5"/>
      <circle cx="140" cy="170" r="1.5" fill="#fbbf24" opacity="0.7"/>
    </g>

    <text x="140" y="270" text-anchor="middle" fill="#fca5a5" font-size="11" font-family="sans-serif" font-weight="600">② POURING</text>
  </g>

  <!-- Arrow -->
  <path d="M 415 200 L 445 200" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
  <polygon points="445,196 453,200 445,204" fill="#f97316"/>

  <!-- STEP 3: Solidification / Cooling -->
  <g transform="translate(460, 70)">
    <!-- Cooling mold -->
    <rect x="10" y="115" width="130" height="80" rx="4" fill="#78716c" stroke="#a8a29e" stroke-width="1"/>
    <!-- Solidifying casting (gradient from hot center to cool edges) -->
    <rect x="30" y="130" width="90" height="50" rx="6" fill="#dc2626" opacity="0.4"/>
    <rect x="45" y="138" width="60" height="34" rx="4" fill="#f97316" opacity="0.4"/>
    <rect x="55" y="145" width="40" height="20" rx="3" fill="#fbbf24" opacity="0.3"/>

    <!-- Cooling arrows (heat leaving) -->
    <path d="M 10 140 L -5 130" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
    <path d="M 10 160 L -5 165" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
    <path d="M 140 140 L 155 130" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
    <path d="M 140 160 L 155 165" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
    <path d="M 75 115 L 75 100" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
    <path d="M 60 115 L 55 100" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
    <path d="M 90 115 L 95 100" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>

    <!-- Time indicator -->
    <rect x="30" y="210" width="90" height="22" rx="3" fill="#1c1917" stroke="#57534e" stroke-width="0.5"/>
    <text x="75" y="225" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="monospace">⏱ COOLING</text>

    <text x="75" y="260" text-anchor="middle" fill="#fca5a5" font-size="11" font-family="sans-serif" font-weight="600">③ SOLIDIFYING</text>
  </g>

  <!-- Arrow -->
  <path d="M 610 200 L 640 200" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
  <polygon points="640,196 648,200 640,204" fill="#f97316"/>

  <!-- STEP 4: Knockout / Finished Casting -->
  <g transform="translate(650, 80)">
    <!-- Finished casting (gear shape) -->
    <g transform="translate(60, 100)">
      <!-- Gear outline -->
      <circle cx="0" cy="0" r="40" fill="#94a3b8" stroke="#cbd5e1" stroke-width="1"/>
      <!-- Gear teeth -->
      <rect x="-6" y="-46" width="12" height="12" rx="1" fill="#94a3b8" stroke="#cbd5e1" stroke-width="0.5"/>
      <rect x="-6" y="34" width="12" height="12" rx="1" fill="#94a3b8" stroke="#cbd5e1" stroke-width="0.5"/>
      <rect x="-46" y="-6" width="12" height="12" rx="1" fill="#94a3b8" stroke="#cbd5e1" stroke-width="0.5"/>
      <rect x="34" y="-6" width="12" height="12" rx="1" fill="#94a3b8" stroke="#cbd5e1" stroke-width="0.5"/>
      <!-- Diagonal teeth -->
      <rect x="22" y="-38" width="12" height="12" rx="1" fill="#94a3b8" stroke="#cbd5e1" stroke-width="0.5" transform="rotate(45 28 -32)"/>
      <rect x="-34" y="22" width="12" height="12" rx="1" fill="#94a3b8" stroke="#cbd5e1" stroke-width="0.5" transform="rotate(45 -28 28)"/>
      <rect x="-34" y="-34" width="12" height="12" rx="1" fill="#94a3b8" stroke="#cbd5e1" stroke-width="0.5" transform="rotate(45 -28 -28)"/>
      <rect x="22" y="22" width="12" height="12" rx="1" fill="#94a3b8" stroke="#cbd5e1" stroke-width="0.5" transform="rotate(45 28 28)"/>
      <!-- Center bore -->
      <circle cx="0" cy="0" r="12" fill="#1c1917" stroke="#64748b" stroke-width="1"/>
      <!-- Keyway -->
      <rect x="-2" y="-14" width="4" height="6" fill="#1c1917"/>
    </g>

    <!-- Sand debris around casting -->
    <circle cx="30" cy="150" r="2" fill="#a8a29e" opacity="0.3"/>
    <circle cx="95" cy="155" r="1.5" fill="#a8a29e" opacity="0.25"/>
    <circle cx="45" cy="160" r="1" fill="#a8a29e" opacity="0.2"/>
    <circle cx="80" cy="162" r="1.8" fill="#a8a29e" opacity="0.3"/>

    <!-- Checkmark -->
    <circle cx="60" cy="165" r="14" fill="#064e3b" stroke="#10b981" stroke-width="1.5" opacity="0.8"/>
    <path d="M 52 165 L 57 171 L 70 157" stroke="#34d399" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <text x="60" y="200" text-anchor="middle" fill="#34d399" font-size="11" font-family="sans-serif" font-weight="600">④ FINISHED</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="370" width="800" height="30" fill="#1c1106" opacity="0.8"/>
  <text x="400" y="390" text-anchor="middle" fill="#78716c" font-size="10" font-family="sans-serif">Sand casting, investment casting, and die casting for complex metal components</text>
</svg>