<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="htbg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a0a"/>
      <stop offset="100%" stop-color="#1e1412"/>
    </linearGradient>
    <linearGradient id="furnace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="50%" stop-color="#991b1b"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="hotmetal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="quench" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
    <linearGradient id="temper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#78350f"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <filter id="htglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="htglow2">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="fireglow" cx="0.5" cy="0.8" r="0.6">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#htbg)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#fde68a" font-size="18" font-family="sans-serif" font-weight="700" letter-spacing="2">HEAT TREATMENT PROCESS</text>
  <text x="400" y="58" text-anchor="middle" fill="#a16207" font-size="11" font-family="sans-serif">Austenitizing → Quenching → Tempering → Finished Part</text>

  <!-- STEP 1: Furnace / Austenitizing -->
  <!-- Furnace body -->
  <rect x="30" y="90" width="200" height="180" rx="8" fill="url(#furnace)" stroke="#dc2626" stroke-width="2"/>
  <!-- Furnace door -->
  <rect x="50" y="110" width="160" height="130" rx="4" fill="#450a0a"/>
  <!-- Fire glow inside -->
  <rect x="50" y="110" width="160" height="130" rx="4" fill="url(#fireglow)"/>
  <!-- Heating elements -->
  <path d="M 65 130 Q 75 120 85 130 Q 95 140 105 130 Q 115 120 125 130 Q 135 140 145 130 Q 155 120 165 130 Q 175 140 185 130 Q 195 120 195 130" stroke="#ef4444" stroke-width="2.5" fill="none" filter="url(#htglow)" opacity="0.8"/>
  <path d="M 65 220 Q 75 230 85 220 Q 95 210 105 220 Q 115 230 125 220 Q 135 210 145 220 Q 155 230 165 220 Q 175 210 185 220 Q 195 230 195 220" stroke="#ef4444" stroke-width="2.5" fill="none" filter="url(#htglow)" opacity="0.8"/>
  <!-- Hot workpiece inside furnace -->
  <rect x="100" y="155" width="60" height="40" rx="4" fill="url(#hotmetal)" filter="url(#htglow)"/>
  <!-- Temperature reading -->
  <rect x="60" y="250" width="80" height="18" rx="3" fill="#450a0a" stroke="#dc2626" stroke-width="0.5"/>
  <text x="100" y="263" text-anchor="middle" fill="#ef4444" font-size="11" font-family="monospace" font-weight="700">860°C</text>
  <!-- Furnace chimney -->
  <rect x="180" y="70" width="20" height="25" fill="#7f1d1d" stroke="#dc2626" stroke-width="1"/>
  <!-- Smoke/heat rising -->
  <path d="M 188 70 Q 185 55 190 45 Q 195 35 188 20" stroke="#94a3b8" stroke-width="1.5" fill="none" opacity="0.3"/>
  <path d="M 194 68 Q 197 50 192 40 Q 187 28 195 15" stroke="#94a3b8" stroke-width="1" fill="none" opacity="0.2"/>

  <text x="130" y="300" text-anchor="middle" fill="#fca5a5" font-size="12" font-family="sans-serif" font-weight="600">① AUSTENITIZING</text>
  <text x="130" y="316" text-anchor="middle" fill="#a16207" font-size="9" font-family="sans-serif">Heat to critical temp</text>

  <!-- Arrow 1→2 -->
  <path d="M 245 190 L 285 190" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
  <polygon points="285,185 295,190 285,195" fill="#f97316"/>

  <!-- STEP 2: Quenching -->
  <!-- Quench tank -->
  <rect x="300" y="120" width="160" height="170" rx="6" fill="url(#quench)" stroke="#0ea5e9" stroke-width="1.5"/>
  <!-- Oil/water level -->
  <rect x="308" y="155" width="144" height="127" rx="3" fill="#0c4a6e" opacity="0.7"/>
  <!-- Waves on surface -->
  <path d="M 308 155 Q 325 148 345 155 Q 365 162 385 155 Q 405 148 425 155 Q 445 162 452 155" stroke="#38bdf8" stroke-width="1.5" fill="none" opacity="0.6"/>
  <!-- Workpiece being dipped (hot to cool gradient) -->
  <rect x="355" y="140" width="50" height="35" rx="3" fill="#f97316" filter="url(#htglow)"/>
  <!-- Steam/bubbles -->
  <circle cx="365" cy="148" r="3" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.5"/>
  <circle cx="380" cy="142" r="2" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.6"/>
  <circle cx="395" cy="146" r="2.5" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.4"/>
  <circle cx="370" cy="135" r="1.5" fill="none" stroke="#94a3b8" stroke-width="0.8" opacity="0.3"/>
  <circle cx="385" cy="130" r="2" fill="none" stroke="#94a3b8" stroke-width="0.8" opacity="0.2"/>
  <!-- Bubbles rising inside -->
  <circle cx="340" cy="200" r="4" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.3"/>
  <circle cx="360" cy="220" r="3" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.25"/>
  <circle cx="410" cy="210" r="5" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.2"/>
  <circle cx="420" cy="240" r="3" fill="none" stroke="#38bdf8" stroke-width="0.8" opacity="0.3"/>
  <!-- Tongs holding piece -->
  <line x1="380" y1="140" x2="380" y2="105" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
  <line x1="375" y1="105" x2="385" y2="105" stroke="#64748b" stroke-width="4" stroke-linecap="round"/>

  <text x="380" y="300" text-anchor="middle" fill="#7dd3fc" font-size="12" font-family="sans-serif" font-weight="600">② QUENCHING</text>
  <text x="380" y="316" text-anchor="middle" fill="#a16207" font-size="9" font-family="sans-serif">Rapid cooling in oil/water</text>

  <!-- Arrow 2→3 -->
  <path d="M 475 190 L 515 190" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>
  <polygon points="515,185 525,190 515,195" fill="#f97316"/>

  <!-- STEP 3: Tempering -->
  <!-- Tempering furnace (smaller, lower temp) -->
  <rect x="530" y="110" width="160" height="160" rx="6" fill="url(#temper)" stroke="#d97706" stroke-width="1.5"/>
  <rect x="545" y="125" width="130" height="120" rx="3" fill="#451a03"/>
  <!-- Subtle heat glow -->
  <rect x="545" y="125" width="130" height="120" rx="3" fill="#f97316" opacity="0.1"/>
  <!-- Workpiece (cooled, now reheating gently) -->
  <rect x="580" y="165" width="50" height="35" rx="3" fill="#78350f" stroke="#d97706" stroke-width="1"/>
  <!-- Gentle heat waves -->
  <path d="M 590 158 Q 593 152 596 158" stroke="#fbbf24" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M 605 156 Q 608 149 611 156" stroke="#fbbf24" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M 618 159 Q 621 153 624 159" stroke="#fbbf24" stroke-width="0.8" fill="none" opacity="0.35"/>
  <!-- Temperature reading -->
  <rect x="560" y="252" width="80" height="18" rx="3" fill="#451a03" stroke="#d97706" stroke-width="0.5"/>
  <text x="600" y="265" text-anchor="middle" fill="#fbbf24" font-size="11" font-family="monospace" font-weight="700">550°C</text>
  <!-- Thermocouple -->
  <line x1="680" y1="150" x2="700" y2="130" stroke="#d97706" stroke-width="1.5"/>
  <circle cx="700" cy="130" r="3" fill="#d97706"/>

  <text x="610" y="300" text-anchor="middle" fill="#fde68a" font-size="12" font-family="sans-serif" font-weight="600">③ TEMPERING</text>
  <text x="610" y="316" text-anchor="middle" fill="#a16207" font-size="9" font-family="sans-serif">Reheat for toughness</text>

  <!-- Bottom: Hardness scale -->
  <rect x="100" y="340" width="600" height="35" rx="6" fill="#1e1412" stroke="#78350f" stroke-width="1"/>
  <text x="120" y="362" fill="#a16207" font-size="10" font-family="sans-serif" font-weight="600">HARDNESS:</text>
  <!-- Scale bar -->
  <rect x="200" y="350" width="400" height="12" rx="6" fill="#1e293b"/>
  <rect x="200" y="350" width="80" height="12" rx="6" fill="#3b82f6" opacity="0.6"/>
  <rect x="280" y="350" width="160" height="12" fill="#f97316" opacity="0.6"/>
  <rect x="440" y="350" width="160" height="12" rx="0 6 6 0" fill="#ef4444" opacity="0.6"/>
  <text x="240" y="346" text-anchor="middle" fill="#93c5fd" font-size="8" font-family="sans-serif">20 HRC</text>
  <text x="360" y="346" text-anchor="middle" fill="#fbbf24" font-size="8" font-family="sans-serif">40 HRC</text>
  <text x="520" y="346" text-anchor="middle" fill="#fca5a5" font-size="8" font-family="sans-serif">60 HRC</text>
  <text x="620" y="362" fill="#94a3b8" font-size="9" font-family="sans-serif">Rockwell C</text>
</svg>