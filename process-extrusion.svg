<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="metal1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="40%" stop-color="#cbd5e1"/>
      <stop offset="60%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="hot1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="30%" stop-color="#f97316"/>
      <stop offset="60%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="die1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="50%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid1" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg1)"/>
  <rect width="800" height="400" fill="url(#grid1)"/>

  <!-- Floor/base -->
  <rect x="0" y="320" width="800" height="80" fill="#1e293b" opacity="0.8"/>
  <line x1="0" y1="320" x2="800" y2="320" stroke="#334155" stroke-width="1"/>

  <!-- Hydraulic Ram (left side) -->
  <rect x="60" y="140" width="140" height="120" rx="6" fill="url(#die1)" stroke="#475569" stroke-width="2"/>
  <rect x="70" y="150" width="120" height="100" rx="3" fill="#1e293b"/>
  <!-- Ram piston -->
  <rect x="200" y="170" width="80" height="60" rx="4" fill="url(#metal1)" stroke="#64748b" stroke-width="1.5"/>
  <!-- Hydraulic lines -->
  <line x1="90" y1="140" x2="90" y2="100" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
  <line x1="170" y1="140" x2="170" y2="100" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="100" x2="170" y2="100" stroke="#64748b" stroke-width="3" stroke-linecap="round"/>
  <!-- Pressure gauge -->
  <circle cx="130" cy="100" r="14" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <circle cx="130" cy="100" r="10" fill="#0f172a"/>
  <line x1="130" y1="100" x2="138" y2="94" stroke="#22c55e" stroke-width="1.5" stroke-linecap="round"/>
  <text x="130" y="122" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="monospace">PSI</text>

  <!-- Billet (hot metal entering die) -->
  <rect x="280" y="170" width="100" height="60" rx="3" fill="url(#hot1)" filter="url(#glow1)"/>
  <!-- Heat shimmer lines -->
  <path d="M 290 165 Q 295 155 300 165" stroke="#fbbf24" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M 320 160 Q 325 148 330 160" stroke="#f97316" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 350 163 Q 355 152 360 163" stroke="#fbbf24" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Extrusion Die (center) -->
  <rect x="380" y="120" width="50" height="160" rx="4" fill="url(#die1)" stroke="#64748b" stroke-width="2"/>
  <!-- Die opening -->
  <rect x="385" y="175" width="40" height="50" rx="2" fill="#0f172a"/>
  <!-- Die profile (T-shape cutout) -->
  <path d="M 393 183 L 417 183 L 417 193 L 410 193 L 410 217 L 400 217 L 400 193 L 393 193 Z" fill="#1e293b" stroke="#475569" stroke-width="0.5"/>
  <!-- Die bolts -->
  <circle cx="393" cy="135" r="4" fill="#475569" stroke="#64748b" stroke-width="1"/>
  <circle cx="417" cy="135" r="4" fill="#475569" stroke="#64748b" stroke-width="1"/>
  <circle cx="393" cy="265" r="4" fill="#475569" stroke="#64748b" stroke-width="1"/>
  <circle cx="417" cy="265" r="4" fill="#475569" stroke="#64748b" stroke-width="1"/>

  <!-- Extruded Profile (right side) - T-bar shape -->
  <g filter="url(#glow1)">
    <rect x="430" y="183" width="200" height="10" rx="1" fill="#f97316" opacity="0.9"/>
    <rect x="430" y="193" width="200" height="24" rx="1" fill="#ea580c" opacity="0.85"/>
    <!-- Cooling gradient on the extruded profile -->
    <rect x="530" y="183" width="100" height="10" rx="1" fill="#94a3b8" opacity="0.4"/>
    <rect x="530" y="193" width="100" height="24" rx="1" fill="#94a3b8" opacity="0.3"/>
    <rect x="580" y="183" width="60" height="10" rx="1" fill="#94a3b8" opacity="0.5"/>
    <rect x="580" y="193" width="60" height="24" rx="1" fill="#94a3b8" opacity="0.45"/>
  </g>

  <!-- Cooling water drops -->
  <circle cx="520" cy="178" r="2" fill="#38bdf8" opacity="0.7"/>
  <circle cx="535" cy="175" r="1.5" fill="#38bdf8" opacity="0.5"/>
  <circle cx="548" cy="180" r="2" fill="#38bdf8" opacity="0.6"/>
  <circle cx="525" cy="222" r="2" fill="#38bdf8" opacity="0.7"/>
  <circle cx="540" cy="225" r="1.5" fill="#38bdf8" opacity="0.5"/>
  <!-- Water spray nozzles -->
  <rect x="510" y="160" width="6" height="15" rx="2" fill="#475569"/>
  <rect x="540" y="160" width="6" height="15" rx="2" fill="#475569"/>
  <rect x="510" y="225" width="6" height="15" rx="2" fill="#475569"/>
  <rect x="540" y="225" width="6" height="15" rx="2" fill="#475569"/>

  <!-- Roller table (right) -->
  <circle cx="650" cy="220" r="12" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <circle cx="650" cy="220" r="5" fill="#1e293b"/>
  <circle cx="690" cy="220" r="12" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <circle cx="690" cy="220" r="5" fill="#1e293b"/>
  <circle cx="730" cy="220" r="12" fill="#334155" stroke="#475569" stroke-width="1.5"/>
  <circle cx="730" cy="220" r="5" fill="#1e293b"/>

  <!-- Direction arrows -->
  <path d="M 250 200 L 275 200" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Labels -->
  <text x="130" y="290" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif" font-weight="600">HYDRAULIC RAM</text>
  <text x="330" y="250" text-anchor="middle" fill="#fbbf24" font-size="10" font-family="sans-serif" font-weight="600">HOT BILLET</text>
  <text x="405" y="295" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="sans-serif" font-weight="600">EXTRUSION DIE</text>
  <text x="530" y="250" text-anchor="middle" fill="#38bdf8" font-size="10" font-family="sans-serif" font-weight="600">COOLING ZONE</text>
  <text x="690" y="260" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif" font-weight="600">ROLLER TABLE</text>

  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" fill="#e2e8f0" font-size="20" font-family="sans-serif" font-weight="700" letter-spacing="2">METAL EXTRUSION PROCESS</text>
  <text x="400" y="72" text-anchor="middle" fill="#64748b" font-size="12" font-family="sans-serif">Hot billet → Die → Cooled profile → Finished product</text>

  <!-- Temperature indicator -->
  <rect x="660" y="40" width="110" height="40" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="672" y="56" fill="#f97316" font-size="10" font-family="monospace" font-weight="700">TEMP</text>
  <text x="672" y="72" fill="#ef4444" font-size="14" font-family="monospace" font-weight="700">480°C</text>
  <circle cx="750" cy="60" r="4" fill="#ef4444" filter="url(#glow1)"/>
</svg>