<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1917"/>
      <stop offset="100%" style="stop-color:#292524"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a1a1aa"/>
      <stop offset="30%" style="stop-color:#e4e4e7"/>
      <stop offset="70%" style="stop-color:#a1a1aa"/>
      <stop offset="100%" style="stop-color:#71717a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Gear shape to represent heavy-duty use -->
  <g transform="translate(200,175)">
    <circle r="80" fill="url(#metal)" stroke="#52525b" stroke-width="2"/>
    <circle r="55" fill="none" stroke="#52525b" stroke-width="1.5"/>
    <circle r="25" fill="#292524" stroke="#52525b" stroke-width="2"/>
    <!-- Gear teeth -->
    <rect x="-12" y="-95" width="24" height="30" rx="3" fill="url(#metal)" stroke="#52525b" stroke-width="1.5"/>
    <rect x="-12" y="65" width="24" height="30" rx="3" fill="url(#metal)" stroke="#52525b" stroke-width="1.5"/>
    <rect x="-95" y="-12" width="30" height="24" rx="3" fill="url(#metal)" stroke="#52525b" stroke-width="1.5"/>
    <rect x="65" y="-12" width="30" height="24" rx="3" fill="url(#metal)" stroke="#52525b" stroke-width="1.5"/>
    <rect x="50" y="50" width="28" height="22" rx="3" fill="url(#metal)" stroke="#52525b" stroke-width="1.5" transform="rotate(45,64,61)"/>
    <rect x="-78" y="50" width="28" height="22" rx="3" fill="url(#metal)" stroke="#52525b" stroke-width="1.5" transform="rotate(-45,-64,61)"/>
    <rect x="50" y="-72" width="28" height="22" rx="3" fill="url(#metal)" stroke="#52525b" stroke-width="1.5" transform="rotate(-45,64,-61)"/>
    <rect x="-78" y="-72" width="28" height="22" rx="3" fill="url(#metal)" stroke="#52525b" stroke-width="1.5" transform="rotate(45,-64,-61)"/>
  </g>
  <!-- Label -->
  <text x="200" y="315" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#f8fafc">20MnCr5</text>
  <text x="200" y="348" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#a1a1aa">Heavy-Duty Steel</text>
  <!-- Badge -->
  <rect x="10" y="10" width="120" height="30" rx="6" fill="#ea580c"/>
  <text x="70" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">HEAVY DUTY</text>
</svg>