<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="mpbg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="30%" stop-color="#94a3b8"/>
      <stop offset="60%" stop-color="#cbd5e1"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="sparks" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="cuttool" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a16207"/>
      <stop offset="100%" stop-color="#78350f"/>
    </linearGradient>
    <filter id="mpglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="mpgrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#1e3a5f" stroke-width="0.3" opacity="0.4"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#mpbg)"/>
  <rect width="800" height="400" fill="url(#mpgrid)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e2e8f0" font-size="18" font-family="sans-serif" font-weight="700" letter-spacing="2">MATERIAL PROCESSING</text>
  <text x="400" y="58" text-anchor="middle" fill="#64748b" font-size="11" font-family="sans-serif">Raw Stock → Cutting → Shaping → Surface Finishing → Quality Check</text>

  <!-- STEP 1: Raw Material / Billet Stack -->
  <g transform="translate(40, 100)">
    <!-- Stacked round bars -->
    <ellipse cx="50" cy="160" rx="45" ry="12" fill="#334155"/>
    <rect x="5" y="100" width="90" height="60" fill="#475569"/>
    <ellipse cx="50" cy="100" rx="45" ry="12" fill="#64748b"/>
    <!-- Cross-section lines -->
    <circle cx="30" cy="100" r="8" fill="none" stroke="#94a3b8" stroke-width="0.8" opacity="0.5"/>
    <circle cx="50" cy="100" r="8" fill="none" stroke="#94a3b8" stroke-width="0.8" opacity="0.5"/>
    <circle cx="70" cy="100" r="8" fill="none" stroke="#94a3b8" stroke-width="0.8" opacity="0.5"/>
    <!-- Individual bars on top -->
    <rect x="15" y="75" width="14" height="25" rx="7" fill="url(#steel)"/>
    <rect x="38" y="70" width="14" height="30" rx="7" fill="url(#steel)"/>
    <rect x="61" y="73" width="14" height="27" rx="7" fill="url(#steel)"/>
    <text x="50" y="190" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif" font-weight="600">RAW STOCK</text>
  </g>

  <!-- Arrow -->
  <path d="M 150 200 L 185 200" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="185,196 193,200 185,204" fill="#3b82f6"/>

  <!-- STEP 2: Band Saw Cutting -->
  <g transform="translate(200, 90)">
    <!-- Saw frame -->
    <rect x="0" y="30" width="100" height="110" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <!-- Saw blade (circular) -->
    <circle cx="50" cy="85" r="35" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="50" cy="85" r="33" fill="none" stroke="#64748b" stroke-width="0.5" stroke-dasharray="3,3"/>
    <circle cx="50" cy="85" r="8" fill="#334155" stroke="#64748b" stroke-width="1"/>
    <!-- Teeth marks -->
    <circle cx="50" cy="85" r="35" fill="none" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="2,4" opacity="0.6"/>
    <!-- Workpiece being cut -->
    <rect x="30" y="115" width="50" height="20" rx="2" fill="url(#steel)"/>
    <line x1="50" y1="115" x2="50" y2="120" stroke="#fbbf24" stroke-width="1" opacity="0.6"/>
    <!-- Sparks -->
    <line x1="50" y1="115" x2="42" y2="105" stroke="#fbbf24" stroke-width="0.8" filter="url(#mpglow)" opacity="0.8"/>
    <line x1="50" y1="115" x2="58" y2="107" stroke="#f97316" stroke-width="0.8" filter="url(#mpglow)" opacity="0.7"/>
    <line x1="50" y1="115" x2="45" y2="100" stroke="#fbbf24" stroke-width="0.6" filter="url(#mpglow)" opacity="0.6"/>
    <circle cx="42" cy="105" r="1.5" fill="#fbbf24" filter="url(#mpglow)"/>
    <circle cx="58" cy="107" r="1" fill="#f97316" filter="url(#mpglow)"/>
    <text x="50" y="165" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif" font-weight="600">CUTTING</text>
  </g>

  <!-- Arrow -->
  <path d="M 315 200 L 350 200" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="350,196 358,200 350,204" fill="#3b82f6"/>

  <!-- STEP 3: CNC Lathe / Turning -->
  <g transform="translate(365, 85)">
    <!-- Lathe bed -->
    <rect x="0" y="80" width="120" height="70" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <!-- Chuck (3-jaw) -->
    <circle cx="25" cy="100" r="22" fill="#334155" stroke="#475569" stroke-width="1.5"/>
    <circle cx="25" cy="100" r="15" fill="#475569"/>
    <circle cx="25" cy="100" r="6" fill="#1e293b"/>
    <!-- Jaw marks -->
    <rect x="18" y="78" width="14" height="6" rx="1" fill="#64748b"/>
    <rect x="6" y="107" width="6" height="14" rx="1" fill="#64748b" transform="rotate(-30 9 114)"/>
    <rect x="32" y="107" width="6" height="14" rx="1" fill="#64748b" transform="rotate(30 35 114)"/>
    <!-- Rotating workpiece -->
    <rect x="47" y="92" width="50" height="16" rx="2" fill="url(#steel)"/>
    <!-- Cutting tool -->
    <polygon points="80,92 80,82 90,82 95,87 95,92" fill="url(#cuttool)" stroke="#a16207" stroke-width="0.5"/>
    <!-- Chip curls -->
    <path d="M 82 86 Q 78 78 82 72 Q 86 66 80 62" stroke="#94a3b8" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- Sparks from cutting -->
    <circle cx="82" cy="85" r="1" fill="#fbbf24" filter="url(#mpglow)"/>
    <line x1="82" y1="86" x2="75" y2="78" stroke="#fbbf24" stroke-width="0.5" opacity="0.7"/>
    <line x1="82" y1="86" x2="78" y2="74" stroke="#f97316" stroke-width="0.5" opacity="0.6"/>
    <!-- Coolant stream -->
    <path d="M 70 75 Q 75 80 80 88" stroke="#38bdf8" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="3,2"/>
    <text x="60" y="170" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif" font-weight="600">CNC TURNING</text>
  </g>

  <!-- Arrow -->
  <path d="M 500 200 L 535 200" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="535,196 543,200 535,204" fill="#3b82f6"/>

  <!-- STEP 4: Surface Grinding / Finishing -->
  <g transform="translate(550, 90)">
    <!-- Grinder body -->
    <rect x="0" y="50" width="100" height="80" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <!-- Grinding wheel -->
    <circle cx="50" cy="75" r="25" fill="#475569" stroke="#64748b" stroke-width="1.5"/>
    <circle cx="50" cy="75" r="20" fill="#334155"/>
    <circle cx="50" cy="75" r="5" fill="#1e293b" stroke="#64748b" stroke-width="0.5"/>
    <!-- Cross-hatch on wheel -->
    <circle cx="50" cy="75" r="22" fill="none" stroke="#64748b" stroke-width="0.3" stroke-dasharray="2,2"/>
    <!-- Workpiece on magnetic chuck -->
    <rect x="20" y="100" width="60" height="12" rx="1" fill="url(#steel)"/>
    <rect x="15" y="112" width="70" height="8" rx="2" fill="#334155" stroke="#475569" stroke-width="0.5"/>
    <!-- Sparks shower -->
    <g filter="url(#mpglow)">
      <line x1="50" y1="100" x2="35" y2="85" stroke="#fbbf24" stroke-width="0.7" opacity="0.8"/>
      <line x1="50" y1="100" x2="30" y2="90" stroke="#f97316" stroke-width="0.7" opacity="0.7"/>
      <line x1="50" y1="100" x2="65" y2="88" stroke="#fbbf24" stroke-width="0.7" opacity="0.6"/>
      <line x1="50" y1="100" x2="70" y2="82" stroke="#f97316" stroke-width="0.5" opacity="0.5"/>
      <circle cx="35" cy="85" r="1.2" fill="#fbbf24"/>
      <circle cx="30" cy="90" r="1" fill="#f97316"/>
      <circle cx="65" cy="88" r="1.2" fill="#fbbf24"/>
    </g>
    <text x="50" y="148" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="sans-serif" font-weight="600">GRINDING</text>
  </g>

  <!-- Arrow -->
  <path d="M 665 200 L 695 200" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  <polygon points="695,196 703,200 695,204" fill="#3b82f6"/>

  <!-- STEP 5: QC / Finished Part -->
  <g transform="translate(710, 100)">
    <!-- Finished part on V-block -->
    <polygon points="20,130 40,150 60,130" fill="#334155" stroke="#475569" stroke-width="1"/>
    <rect x="28" y="108" width="24" height="24" rx="3" fill="url(#steel)" stroke="#94a3b8" stroke-width="0.5"/>
    <!-- Checkmark -->
    <circle cx="40" cy="85" r="18" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
    <path d="M 30 85 L 37 93 L 52 77" stroke="#34d399" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="170" text-anchor="middle" fill="#34d399" font-size="10" font-family="sans-serif" font-weight="600">QC PASS</text>
  </g>

  <!-- Bottom info bar -->
  <rect x="0" y="360" width="800" height="40" fill="#0c1220" opacity="0.8"/>
  <text x="400" y="385" text-anchor="middle" fill="#475569" font-size="10" font-family="sans-serif">Complete material processing workflow — from raw stock to finished, inspected parts</text>
</svg>