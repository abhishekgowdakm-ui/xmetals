<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="fgbg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0505"/>
      <stop offset="100%" stop-color="#1c1917"/>
    </linearGradient>
    <linearGradient id="fghot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="40%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="fgdie" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#57534e"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
    <linearGradient id="fgpress" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#44403c"/>
      <stop offset="50%" stop-color="#57534e"/>
      <stop offset="100%" stop-color="#44403c"/>
    </linearGradient>
    <filter id="fgglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fgglow2">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="impactglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#fgbg)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#fde68a" font-size="18" font-family="sans-serif" font-weight="700" letter-spacing="2">METAL FORGING &amp; FORMING</text>

  <!-- LEFT: Drop Forge Press -->
  <g transform="translate(40, 50)">
    <!-- Press frame (C-frame) -->
    <rect x="20" y="0" width="180" height="280" rx="6" fill="url(#fgpress)" stroke="#78716c" stroke-width="1.5"/>
    <!-- Frame inner -->
    <rect x="40" y="40" width="140" height="200" rx="4" fill="#1c1917"/>

    <!-- Upper die / hammer -->
    <rect x="70" y="50" width="80" height="40" rx="3" fill="url(#fgdie)" stroke="#78716c" stroke-width="1"/>
    <!-- Ram -->
    <rect x="90" y="20" width="40" height="35" fill="#57534e" stroke="#78716c" stroke-width="0.8"/>
    <!-- Motion lines (hammer coming down) -->
    <line x1="75" y1="50" x2="75" y2="35" stroke="#78716c" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
    <line x1="145" y1="50" x2="145" y2="35" stroke="#78716c" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>

    <!-- Hot workpiece -->
    <ellipse cx="110" cy="115" rx="40" ry="15" fill="url(#fghot)" filter="url(#fgglow)"/>
    <!-- Impact glow -->
    <ellipse cx="110" cy="115" rx="60" ry="30" fill="url(#impactglow)"/>

    <!-- Lower die / anvil -->
    <rect x="70" y="125" width="80" height="35" rx="3" fill="url(#fgdie)" stroke="#78716c" stroke-width="1"/>
    <!-- Die cavity -->
    <path d="M 85 125 Q 110 118 135 125" stroke="#a8a29e" stroke-width="0.8" fill="none"/>

    <!-- Base -->
    <rect x="50" y="160" width="120" height="70" rx="3" fill="#44403c" stroke="#78716c" stroke-width="0.8"/>

    <!-- Sparks flying out -->
    <g filter="url(#fgglow2)">
      <line x1="70" y1="115" x2="45" y2="100" stroke="#fbbf24" stroke-width="1" opacity="0.8"/>
      <line x1="70" y1="115" x2="40" y2="112" stroke="#f97316" stroke-width="0.8" opacity="0.7"/>
      <line x1="150" y1="115" x2="175" y2="102" stroke="#fbbf24" stroke-width="1" opacity="0.8"/>
      <line x1="150" y1="115" x2="178" y2="115" stroke="#f97316" stroke-width="0.8" opacity="0.6"/>
      <circle cx="45" cy="100" r="2" fill="#fbbf24"/>
      <circle cx="40" cy="112" r="1.5" fill="#f97316"/>
      <circle cx="175" cy="102" r="2" fill="#fbbf24"/>
      <circle cx="178" cy="115" r="1.5" fill="#f97316"/>
      <!-- Flash (excess material) -->
      <ellipse cx="110" cy="120" rx="55" ry="3" fill="#dc2626" opacity="0.3"/>
    </g>

    <text x="110" y="260" text-anchor="middle" fill="#fde68a" font-size="12" font-family="sans-serif" font-weight="600">DROP FORGING</text>
    <text x="110" y="276" text-anchor="middle" fill="#a16207" font-size="9" font-family="sans-serif">1100°C closed-die</text>
  </g>

  <!-- CENTER: Rolling Mill -->
  <g transform="translate(290, 70)">
    <!-- Frame -->
    <rect x="10" y="10" width="200" height="240" rx="6" fill="#292524" stroke="#57534e" stroke-width="1"/>

    <!-- Top roll -->
    <ellipse cx="110" cy="80" rx="70" ry="35" fill="#44403c" stroke="#78716c" stroke-width="1.5"/>
    <ellipse cx="110" cy="80" rx="15" ry="35" fill="#57534e" opacity="0.5"/>
    <!-- Roll texture -->
    <ellipse cx="110" cy="80" rx="70" ry="35" fill="none" stroke="#78716c" stroke-width="0.3" stroke-dasharray="4,4"/>

    <!-- Bottom roll -->
    <ellipse cx="110" cy="170" rx="70" ry="35" fill="#44403c" stroke="#78716c" stroke-width="1.5"/>
    <ellipse cx="110" cy="170" rx="15" ry="35" fill="#57534e" opacity="0.5"/>
    <ellipse cx="110" cy="170" rx="70" ry="35" fill="none" stroke="#78716c" stroke-width="0.3" stroke-dasharray="4,4"/>

    <!-- Hot slab going through -->
    <rect x="20" y="112" width="180" height="26" rx="2" fill="url(#fghot)" filter="url(#fgglow)"/>
    <!-- Deformation zone (thinner in middle) -->
    <rect x="70" y="115" width="80" height="20" rx="1" fill="#f97316" opacity="0.8"/>

    <!-- Rolling direction arrows -->
    <path d="M 5 125 L -15 125" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="-15,121 -22,125 -15,129" fill="#fbbf24"/>
    <path d="M 215 125 L 235 125" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round"/>
    <polygon points="235,121 242,125 235,129" fill="#fbbf24"/>

    <!-- Bearing housings -->
    <rect x="0" y="65" width="15" height="30" rx="3" fill="#57534e" stroke="#78716c" stroke-width="0.5"/>
    <rect x="205" y="65" width="15" height="30" rx="3" fill="#57534e" stroke="#78716c" stroke-width="0.5"/>
    <rect x="0" y="155" width="15" height="30" rx="3" fill="#57534e" stroke="#78716c" stroke-width="0.5"/>
    <rect x="205" y="155" width="15" height="30" rx="3" fill="#57534e" stroke="#78716c" stroke-width="0.5"/>

    <!-- Rotation arrows on rolls -->
    <path d="M 160 55 A 20 20 0 0 1 170 75" stroke="#a8a29e" stroke-width="1" fill="none" stroke-linecap="round"/>
    <polygon points="170,73 174,79 166,78" fill="#a8a29e"/>
    <path d="M 160 195 A 20 20 0 0 0 170 175" stroke="#a8a29e" stroke-width="1" fill="none" stroke-linecap="round"/>
    <polygon points="170,177 174,171 166,172" fill="#a8a29e"/>

    <text x="110" y="275" text-anchor="middle" fill="#fde68a" font-size="12" font-family="sans-serif" font-weight="600">HOT ROLLING</text>
    <text x="110" y="291" text-anchor="middle" fill="#a16207" font-size="9" font-family="sans-serif">Plate &amp; sheet forming</text>
  </g>

  <!-- RIGHT: Wire Drawing / Cold Drawing -->
  <g transform="translate(560, 60)">
    <rect x="0" y="20" width="200" height="240" rx="6" fill="#292524" stroke="#57534e" stroke-width="1"/>

    <!-- Drawing die -->
    <polygon points="70,100 130,100 120,140 80,140" fill="url(#fgdie)" stroke="#78716c" stroke-width="1.5"/>
    <!-- Die opening -->
    <rect x="95" y="100" width="10" height="45" fill="#1c1917"/>
    <!-- Die insert (tungsten carbide) -->
    <rect x="92" y="112" width="16" height="16" rx="2" fill="#57534e" stroke="#a8a29e" stroke-width="0.5"/>
    <rect x="96" y="116" width="8" height="8" rx="1" fill="#1c1917"/>

    <!-- Input wire (thicker) -->
    <rect x="80" y="60" width="40" height="40" rx="3" fill="#94a3b8" stroke="#cbd5e1" stroke-width="0.5"/>
    <!-- Cross hatching on bar -->
    <line x1="85" y1="65" x2="115" y2="95" stroke="#cbd5e1" stroke-width="0.3" opacity="0.3"/>
    <line x1="85" y1="80" x2="100" y2="95" stroke="#cbd5e1" stroke-width="0.3" opacity="0.3"/>

    <!-- Output wire (thinner, drawn) -->
    <rect x="90" y="145" width="20" height="80" rx="2" fill="#cbd5e1" stroke="#e2e8f0" stroke-width="0.5"/>
    <!-- Surface finish marks -->
    <line x1="93" y1="155" x2="107" y2="155" stroke="#e2e8f0" stroke-width="0.3" opacity="0.4"/>
    <line x1="93" y1="175" x2="107" y2="175" stroke="#e2e8f0" stroke-width="0.3" opacity="0.4"/>
    <line x1="93" y1="195" x2="107" y2="195" stroke="#e2e8f0" stroke-width="0.3" opacity="0.4"/>

    <!-- Force arrow (pulling down) -->
    <line x1="100" y1="230" x2="100" y2="250" stroke="#38bdf8" stroke-width="2" stroke-linecap="round"/>
    <polygon points="95,248 100,258 105,248" fill="#38bdf8"/>
    <text x="100" y="270" text-anchor="middle" fill="#38bdf8" font-size="8" font-family="sans-serif">PULL FORCE</text>

    <!-- Dimension labels -->
    <line x1="70" y1="75" x2="78" y2="75" stroke="#a8a29e" stroke-width="0.5"/>
    <text x="65" y="78" text-anchor="end" fill="#a8a29e" font-size="8" font-family="monospace">Ø40</text>
    <line x1="115" y1="180" x2="125" y2="180" stroke="#a8a29e" stroke-width="0.5"/>
    <text x="130" y="183" fill="#a8a29e" font-size="8" font-family="monospace">Ø20</text>

    <text x="100" y="295" text-anchor="middle" fill="#fde68a" font-size="12" font-family="sans-serif" font-weight="600">COLD DRAWING</text>
    <text x="100" y="311" text-anchor="middle" fill="#a16207" font-size="9" font-family="sans-serif">Bar &amp; wire sizing</text>
  </g>

  <!-- Bottom info -->
  <rect x="0" y="370" width="800" height="30" fill="#1c1917" opacity="0.8"/>
  <text x="400" y="390" text-anchor="middle" fill="#78716c" font-size="10" font-family="sans-serif">Metal forming processes — shaping raw material into precision components</text>
</svg>