<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b"/>
      <stop offset="100%" style="stop-color:#27272a"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#71717a"/>
      <stop offset="30%" style="stop-color:#e4e4e7"/>
      <stop offset="60%" style="stop-color:#a1a1aa"/>
      <stop offset="100%" style="stop-color:#52525b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Tool steel - die/punch shape -->
  <rect x="130" y="80" width="140" height="180" rx="5" fill="url(#metal)" stroke="#52525b" stroke-width="2"/>
  <rect x="155" y="65" width="90" height="30" rx="4" fill="#a1a1aa" stroke="#52525b" stroke-width="1.5"/>
  <!-- Cutting edge detail -->
  <polygon points="130,260 170,280 230,280 270,260" fill="#d4d4d8" stroke="#52525b" stroke-width="2"/>
  <!-- Cross marks for tool steel -->
  <line x1="160" y1="130" x2="240" y2="130" stroke="#52525b" stroke-width="1" stroke-dasharray="6,3"/>
  <line x1="160" y1="170" x2="240" y2="170" stroke="#52525b" stroke-width="1" stroke-dasharray="6,3"/>
  <line x1="160" y1="210" x2="240" y2="210" stroke="#52525b" stroke-width="1" stroke-dasharray="6,3"/>
  <!-- Label -->
  <text x="200" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#f8fafc">OHNS</text>
  <text x="200" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#a1a1aa">Tool Steel</text>
  <!-- Badge -->
  <rect x="10" y="10" width="110" height="30" rx="6" fill="#dc2626"/>
  <text x="65" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">TOOL STEEL</text>
</svg>