<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <defs>
    <linearGradient id="stbg" x1="0" y1="0" x2="800" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f1b30"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="25%" stop-color="#e2e8f0"/>
      <stop offset="50%" stop-color="#f8fafc"/>
      <stop offset="75%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="electrolyte" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="zinc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a1a1aa"/>
      <stop offset="100%" stop-color="#71717a"/>
    </linearGradient>
    <filter id="stglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#stbg)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#93c5fd" font-size="18" font-family="sans-serif" font-weight="700" letter-spacing="2">SURFACE TREATMENT PROCESSES</text>

  <!-- LEFT: Electroplating -->
  <g transform="translate(30, 55)">
    <text x="105" y="15" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="sans-serif" font-weight="600">ELECTROPLATING</text>

    <!-- Tank -->
    <rect x="15" y="60" width="180" height="180" rx="4" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <!-- Electrolyte solution -->
    <rect x="25" y="90" width="160" height="140" rx="2" fill="url(#electrolyte)"/>
    <!-- Liquid surface -->
    <path d="M 25 90 Q 55 84 85 90 Q 115 96 145 90 Q 165 84 185 90" stroke="#3b82f6" stroke-width="1" fill="none" opacity="0.6"/>

    <!-- DC Power supply -->
    <rect x="40" y="30" width="130" height="25" rx="4" fill="#1e293b" stroke="#475569" stroke-width="1"/>
    <text x="105" y="47" text-anchor="middle" fill="#3b82f6" font-size="9" font-family="monospace" font-weight="700">DC POWER 6V</text>
    <!-- Wires -->
    <line x1="65" y1="55" x2="65" y2="95" stroke="#ef4444" stroke-width="2"/>
    <line x1="145" y1="55" x2="145" y2="95" stroke="#3b82f6" stroke-width="2"/>
    <text x="55" y="68" fill="#ef4444" font-size="10" font-family="sans-serif" font-weight="700">+</text>
    <text x="150" y="68" fill="#3b82f6" font-size="10" font-family="sans-serif" font-weight="700">−</text>

    <!-- Anode (metal source) -->
    <rect x="50" y="95" width="25" height="110" rx="2" fill="url(#zinc)" stroke="#a1a1aa" stroke-width="0.5"/>
    <text x="62" y="160" text-anchor="middle" fill="#d4d4d8" font-size="7" font-family="sans-serif" transform="rotate(-90 62 160)">ANODE</text>

    <!-- Cathode (workpiece) -->
    <rect x="130" y="100" width="30" height="90" rx="3" fill="#475569" stroke="#94a3b8" stroke-width="1"/>
    <!-- Chrome layer forming -->
    <rect x="128" y="100" width="2" height="90" rx="1" fill="url(#chrome)" opacity="0.7"/>
    <text x="145" y="210" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="sans-serif">WORKPIECE</text>

    <!-- Ion flow arrows -->
    <g opacity="0.5">
      <path d="M 80 120 L 120 120" stroke="#60a5fa" stroke-width="0.8"/>
      <polygon points="118,118 124,120 118,122" fill="#60a5fa"/>
      <path d="M 82 145 L 118 145" stroke="#60a5fa" stroke-width="0.8"/>
      <polygon points="116,143 122,145 116,147" fill="#60a5fa"/>
      <path d="M 85 170 L 122 170" stroke="#60a5fa" stroke-width="0.8"/>
      <polygon points="120,168 126,170 120,172" fill="#60a5fa"/>
    </g>
    <!-- Bubbles -->
    <circle cx="140" cy="130" r="2" fill="none" stroke="#60a5fa" stroke-width="0.5" opacity="0.4"/>
    <circle cx="135" cy="110" r="1.5" fill="none" stroke="#60a5fa" stroke-width="0.5" opacity="0.3"/>
    <circle cx="60" cy="140" r="2.5" fill="none" stroke="#60a5fa" stroke-width="0.5" opacity="0.35"/>

    <text x="105" y="265" text-anchor="middle" fill="#93c5fd" font-size="10" font-family="sans-serif" font-weight="600">Chrome / Zinc / Nickel plating</text>
  </g>

  <!-- CENTER: Shot Blasting / Peening -->
  <g transform="translate(280, 55)">
    <text x="110" y="15" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="sans-serif" font-weight="600">SHOT PEENING</text>

    <!-- Blast cabinet -->
    <rect x="10" y="40" width="200" height="200" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <!-- Interior -->
    <rect x="25" y="55" width="170" height="160" rx="3" fill="#0f172a"/>

    <!-- Nozzle -->
    <rect x="40" y="70" width="15" height="50" rx="2" fill="#475569" stroke="#64748b" stroke-width="0.8" transform="rotate(-30 47 95)"/>

    <!-- Shot stream -->
    <g filter="url(#stglow)">
      <!-- Shot particles -->
      <circle cx="95" cy="110" r="1.5" fill="#94a3b8" opacity="0.8"/>
      <circle cx="100" cy="115" r="1.2" fill="#94a3b8" opacity="0.7"/>
      <circle cx="88" cy="118" r="1.5" fill="#94a3b8" opacity="0.6"/>
      <circle cx="105" cy="105" r="1" fill="#94a3b8" opacity="0.8"/>
      <circle cx="92" cy="108" r="1.3" fill="#94a3b8" opacity="0.7"/>
      <circle cx="98" cy="122" r="1.5" fill="#94a3b8" opacity="0.5"/>
      <circle cx="85" cy="112" r="1.2" fill="#94a3b8" opacity="0.6"/>
      <circle cx="102" cy="100" r="1" fill="#94a3b8" opacity="0.9"/>
      <!-- Bouncing particles -->
      <circle cx="130" cy="145" r="1" fill="#64748b" opacity="0.4"/>
      <circle cx="145" cy="140" r="0.8" fill="#64748b" opacity="0.3"/>
      <circle cx="120" cy="150" r="1.2" fill="#64748b" opacity="0.35"/>
    </g>

    <!-- Workpiece on turntable -->
    <rect x="100" y="140" width="70" height="45" rx="3" fill="#475569" stroke="#64748b" stroke-width="1"/>
    <!-- Surface dimples (peened surface) -->
    <circle cx="115" cy="148" r="2" fill="none" stroke="#94a3b8" stroke-width="0.3" opacity="0.5"/>
    <circle cx="122" cy="152" r="2" fill="none" stroke="#94a3b8" stroke-width="0.3" opacity="0.5"/>
    <circle cx="128" cy="147" r="2" fill="none" stroke="#94a3b8" stroke-width="0.3" opacity="0.5"/>
    <circle cx="135" cy="153" r="2" fill="none" stroke="#94a3b8" stroke-width="0.3" opacity="0.5"/>
    <circle cx="142" cy="148" r="2" fill="none" stroke="#94a3b8" stroke-width="0.3" opacity="0.5"/>
    <circle cx="118" cy="157" r="2" fill="none" stroke="#94a3b8" stroke-width="0.3" opacity="0.5"/>
    <circle cx="130" cy="160" r="2" fill="none" stroke="#94a3b8" stroke-width="0.3" opacity="0.5"/>

    <!-- Turntable -->
    <ellipse cx="135" cy="190" rx="50" ry="8" fill="#334155" stroke="#475569" stroke-width="0.5"/>
    <ellipse cx="135" cy="188" rx="50" ry="8" fill="#1e293b"/>

    <!-- Impact zone visualization (cross-section below) -->
    <rect x="30" y="215" width="160" height="30" rx="3" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <!-- Before/after surface -->
    <text x="50" y="228" fill="#64748b" font-size="7" font-family="sans-serif">Before:</text>
    <line x1="80" y1="225" x2="140" y2="225" stroke="#64748b" stroke-width="1"/>
    <text x="50" y="240" fill="#60a5fa" font-size="7" font-family="sans-serif">After:</text>
    <path d="M 80 237 Q 85 234 90 237 Q 95 240 100 237 Q 105 234 110 237 Q 115 240 120 237 Q 125 234 130 237 Q 135 240 140 237" stroke="#60a5fa" stroke-width="1" fill="none"/>

    <text x="110" y="265" text-anchor="middle" fill="#93c5fd" font-size="10" font-family="sans-serif" font-weight="600">Compressive stress layer</text>
  </g>

  <!-- RIGHT: Anodizing -->
  <g transform="translate(540, 55)">
    <text x="110" y="15" text-anchor="middle" fill="#e2e8f0" font-size="13" font-family="sans-serif" font-weight="600">ANODIZING</text>

    <!-- Multiple dip tanks -->
    <!-- Tank 1: Cleaning -->
    <rect x="10" y="80" width="50" height="90" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="15" y="95" width="40" height="65" rx="2" fill="#0f172a" opacity="0.8"/>
    <text x="35" y="75" text-anchor="middle" fill="#94a3b8" font-size="7" font-family="sans-serif">CLEAN</text>

    <!-- Tank 2: Anodize -->
    <rect x="75" y="60" width="70" height="110" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="80" y="80" width="60" height="80" rx="2" fill="#2563eb" opacity="0.15"/>
    <!-- Electrolyte -->
    <path d="M 80 80 Q 95 76 110 80 Q 125 84 140 80" stroke="#3b82f6" stroke-width="0.8" fill="none" opacity="0.4"/>
    <!-- Aluminium part being anodized -->
    <rect x="98" y="70" width="24" height="75" rx="2" fill="#94a3b8" stroke="#cbd5e1" stroke-width="0.8"/>
    <!-- Oxide layer forming -->
    <rect x="95" y="70" width="3" height="75" rx="1" fill="#3b82f6" opacity="0.4"/>
    <rect x="122" y="70" width="3" height="75" rx="1" fill="#3b82f6" opacity="0.4"/>
    <!-- Wire -->
    <line x1="110" y1="70" x2="110" y2="50" stroke="#64748b" stroke-width="1.5"/>
    <text x="110" y="55" text-anchor="middle" fill="#3b82f6" font-size="7" font-family="sans-serif" font-weight="600">ANODIZE</text>

    <!-- Tank 3: Dye/Seal -->
    <rect x="160" y="80" width="50" height="90" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <rect x="165" y="95" width="40" height="65" rx="2" fill="#7c3aed" opacity="0.15"/>
    <text x="185" y="75" text-anchor="middle" fill="#a78bfa" font-size="7" font-family="sans-serif">DYE/SEAL</text>

    <!-- Arrows between tanks -->
    <path d="M 62 125 L 73 125" stroke="#475569" stroke-width="1" stroke-linecap="round"/>
    <polygon points="73,122 78,125 73,128" fill="#475569"/>
    <path d="M 147 125 L 158 125" stroke="#475569" stroke-width="1" stroke-linecap="round"/>
    <polygon points="158,122 163,125 158,128" fill="#475569"/>

    <!-- Cross-section detail of anodized layer -->
    <rect x="10" y="190" width="200" height="55" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <text x="110" y="205" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="sans-serif" font-weight="600">CROSS-SECTION</text>
    <!-- Base metal -->
    <rect x="30" y="220" width="160" height="15" rx="1" fill="#94a3b8" opacity="0.6"/>
    <text x="110" y="231" text-anchor="middle" fill="#0f172a" font-size="7" font-family="sans-serif" font-weight="600">ALUMINIUM BASE</text>
    <!-- Oxide layer -->
    <rect x="30" y="213" width="160" height="7" rx="1" fill="#3b82f6" opacity="0.5"/>
    <text x="110" y="210" text-anchor="middle" fill="#93c5fd" font-size="6" font-family="sans-serif">Al₂O₃ oxide layer (25-100μm)</text>

    <text x="110" y="265" text-anchor="middle" fill="#93c5fd" font-size="10" font-family="sans-serif" font-weight="600">Aluminium oxide coating</text>
  </g>

  <!-- Bottom bar -->
  <rect x="30" y="340" width="740" height="40" rx="6" fill="#0f172a" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="400" y="355" text-anchor="middle" fill="#475569" font-size="9" font-family="sans-serif" font-weight="600">SURFACE TREATMENT BENEFITS</text>
  <text x="130" y="372" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">Corrosion Resistance</text>
  <text x="310" y="372" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">Wear Resistance</text>
  <text x="490" y="372" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">Fatigue Life</text>
  <text x="660" y="372" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="sans-serif">Aesthetic Finish</text>
  <!-- Dots separators -->
  <circle cx="220" cy="370" r="2" fill="#334155"/>
  <circle cx="400" cy="370" r="2" fill="#334155"/>
  <circle cx="575" cy="370" r="2" fill="#334155"/>
</svg>