<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#334155"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8"/>
      <stop offset="50%" style="stop-color:#cbd5e1"/>
      <stop offset="100%" style="stop-color:#94a3b8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Round bar cross section -->
  <ellipse cx="200" cy="180" rx="100" ry="100" fill="url(#metal)" stroke="#64748b" stroke-width="3"/>
  <ellipse cx="200" cy="180" rx="70" ry="70" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="4,4"/>
  <ellipse cx="200" cy="180" rx="40" ry="40" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="200" cy="180" r="5" fill="#475569"/>
  <!-- Label -->
  <text x="200" y="320" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#f8fafc">C45</text>
  <text x="200" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#94a3b8">Carbon Steel</text>
  <!-- Badge -->
  <rect x="10" y="10" width="120" height="30" rx="6" fill="#3b82f6"/>
  <text x="70" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff">MEDIUM CARBON</text>
</svg>